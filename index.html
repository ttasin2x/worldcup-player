<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate TV - Premium Dark</title>
    
    <!-- ইঞ্জিন ১: HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- ইঞ্জিন ২: Google Shaka Player -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>
    <!-- Plyr (প্রিমিয়াম ভিডিও প্লেয়ার UI) -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
    <style>
        :root {
            --bg-black: #000000;
            --surface-dark: #121212;
            --surface-light: #262626;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-blue: #3a36f4; 
            --accent-red: #ff3b30;  
            
            --plyr-color-main: var(--accent-blue);
            --plyr-video-background: #000000;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { background-color: var(--bg-black); color: var(--text-primary); -webkit-font-smoothing: antialiased; }

        .top-player-section {
            background-color: var(--bg-black); width: 100%; position: sticky; top: 0; z-index: 100;
        }

        .player-wrapper { width: 100%; max-width: 800px; margin: 0 auto; position: relative; }

        .fake-progress-bar {
            width: 100%; height: 3px; background-color: #333; position: relative; margin-top: -4px; z-index: 10;
        }
        .fake-progress-fill {
            width: 85%; height: 100%; background-color: var(--accent-red); position: relative;
        }
        .fake-progress-fill::after {
            content: ''; position: absolute; right: -5px; top: -3.5px; width: 10px; height: 10px;
            background-color: var(--accent-red); border-radius: 50%;
        }

        /* স্ট্যাটাস বার */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            padding: 15px 20px 10px 20px; max-width: 800px; margin: 0 auto; gap: 10px;
        }
        
        .live-indicator { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
        .live-dot { width: 10px; height: 10px; background-color: var(--accent-red); border-radius: 50%; }

        /* নেটওয়ার্ক স্পিড ও ডেটা মিটার */
        .net-stats {
            display: flex; gap: 8px; font-size: 11px; font-weight: 600;
        }
        .stat-badge {
            background: var(--surface-light); padding: 4px 8px; border-radius: 6px;
            color: var(--text-secondary); border: 1px solid #3f3f46;
        }

        .engine-status { color: var(--text-secondary); font-size: 11px; font-weight: 500; }

        .category-tabs { 
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px 20px 20px; 
            max-width: 800px; margin: 0 auto; scrollbar-width: none; 
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .cat-tab { 
            background: var(--surface-light); color: var(--text-primary); border: none; 
            padding: 10px 20px; border-radius: 25px; font-size: 14px; font-weight: 500; 
            cursor: pointer; white-space: nowrap; transition: 0.2s ease; 
        }
        .cat-tab.active { background: var(--accent-blue); color: var(--text-primary); font-weight: 600; }

        .bottom-sheet {
            background-color: var(--surface-dark); border-radius: 24px 24px 0 0; padding: 20px;
            min-height: 60vh; max-width: 800px; margin: 0 auto;
        }
        .drag-handle { width: 40px; height: 4px; background-color: #3f3f46; border-radius: 2px; margin: 0 auto 20px auto; }

        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .list-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .fetch-status { font-size: 12px; }

        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .channel-card {
            background: var(--bg-black); color: var(--text-primary); padding: 16px 12px; border-radius: 16px; 
            text-align: center; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s ease; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent;
        }
        .channel-card:active { transform: scale(0.96); }
        .channel-card.active { border: 1px solid var(--accent-blue); background: rgba(58, 54, 244, 0.1); color: #a5a3ff; }
    </style>
</head>
<body>

    <div class="top-player-section">
        <div class="player-wrapper">
            <video id="video-player" playsinline controls></video>
            
            <div class="fake-progress-bar"><div class="fake-progress-fill"></div></div>

            <div class="status-bar">
                <div class="live-indicator">
                    <span class="live-dot" id="live-dot" style="display:none;"></span>
                    <span id="now-playing-text">চ্যানেল সিলেক্ট করুন</span>
                </div>
                
                <!-- ডেটা ও স্পিড মিটার -->
                <div class="net-stats" id="network-stats">
                    <span class="stat-badge">🚀 0.0 Mbps</span>
                    <span class="stat-badge">📊 0.0 MB</span>
                </div>

                <span class="engine-status" id="engine-status">Standby</span>
            </div>
            
            <div class="category-tabs" id="category-tabs"></div>
        </div>
    </div>

    <div class="bottom-sheet">
        <div class="drag-handle"></div>
        <div class="list-header">
            <div class="list-title">Live channels</div>
            <div class="fetch-status" id="fetch-status">ডেটা লোড হচ্ছে...</div>
        </div>
        <div class="channel-grid" id="channel-grid"></div>
    </div>

    <script>
        shaka.polyfill.installAll();

        const videoElement = document.getElementById('video-player');
        const nowPlayingText = document.getElementById('now-playing-text');
        const engineStatus = document.getElementById('engine-status');
        const liveDot = document.getElementById('live-dot');
        const networkStats = document.getElementById('network-stats');
        const tabsContainer = document.getElementById('category-tabs');
        const channelGrid = document.getElementById('channel-grid');
        const fetchStatus = document.getElementById('fetch-status');
        
        const player = new Plyr(videoElement, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
            keyboard: { focused: true, global: true }
        });

        let currentHls = null;
        let currentShaka = null;
        let currentPlayingUrl = ''; 
        
        // ==========================================
        // Network Tracker (Speed & Data Usage)
        // ==========================================
        let totalSessionBytes = 0; 
        let statTrackerInterval = null;

        function updateNetworkUI(speedMbps, totalMb) {
            networkStats.innerHTML = `
                <span class="stat-badge">🚀 ${speedMbps} Mbps</span>
                <span class="stat-badge">📊 ${totalMb} MB</span>
            `;
        }

        function startNetworkTracking(engineType) {
            clearInterval(statTrackerInterval);
            
            // HLS.js এর ট্র্যাকিং সরাসরি ইভেন্ট থেকে হয়, তাই এখানে কিছু করতে হবে না
            if (engineType === 'hls') return;

            // Shaka বা Native এর জন্য এস্টিমেশন (প্রতি সেকেন্ডে)
            statTrackerInterval = setInterval(() => {
                let speed = "0.0";
                let bytesPerSec = 0;

                if (engineType === 'shaka' && currentShaka) {
                    const stats = currentShaka.getStats();
                    const bandwidthBits = stats.streamBandwidth || stats.estimatedBandwidth || 1500000;
                    speed = (bandwidthBits / 1000000).toFixed(1);
                    bytesPerSec = bandwidthBits / 8;
                } 
                else if (engineType === 'native') {
                    // Native player fallback estimation
                    speed = navigator.connection ? navigator.connection.downlink.toFixed(1) : "1.5";
                    bytesPerSec = (parseFloat(speed) * 1000000) / 8;
                }

                totalSessionBytes += bytesPerSec;
                let totalMb = (totalSessionBytes / 1048576).toFixed(1);
                updateNetworkUI(speed, totalMb);

            }, 1000);
        }

        // ==========================================
        // চ্যানেল ফেচ ও রেন্ডারিং
        // ==========================================
        const m3uUrls = [
            'https://raw.githubusercontent.com/sanjoykb/-KB-TV-Playlist/refs/heads/main/Github%20Auto%20Update%20Channel.m3u',
            'https://raw.githubusercontent.com/ttasin2x/Playlist.m3u/refs/heads/main/Playlist.m3u',
            'https://raw.githubusercontent.com/sm-monirulislam/Toffee-Auto-Update-Playlist/refs/heads/main/Ns_player.m3u'
        ];

        let groupedChannels = {};

        async function fetchChannels() {
            let successCount = 0;
            groupedChannels = {}; 

            for (const url of m3uUrls) {
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        const data = await response.text();
                        parseM3U(data);
                        successCount++;
                    }
                } catch (error) { console.error("Fetch Error"); }
            }

            if (successCount > 0) {
                fetchStatus.innerText = `Updated ✅`; fetchStatus.style.color = "#4ade80";
                buildCategoryTabs(); renderChannels('All'); 
            } else {
                fetchStatus.innerText = "Failed ❌"; fetchStatus.style.color = "#f87171";
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let channelName = ''; let groupName = 'Others'; 

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const parts = line.split(',');
                    channelName = parts[parts.length - 1].trim();
                    const groupMatch = line.match(/group-title="([^"]+)"/i);
                    groupName = groupMatch && groupMatch[1] ? groupMatch[1].trim() : 'Others';
                } 
                else if (line.startsWith('http')) {
                    if (!groupedChannels[groupName]) groupedChannels[groupName] = [];
                    groupedChannels[groupName].push({ name: channelName || 'Unknown', url: line });
                    channelName = ''; groupName = 'Others';
                }
            });
        }

        function buildCategoryTabs() {
            tabsContainer.innerHTML = '';
            const allTab = document.createElement('button');
            allTab.className = 'cat-tab active'; allTab.innerText = 'All';
            allTab.onclick = () => switchTab('All', allTab);
            tabsContainer.appendChild(allTab);

            for (const category in groupedChannels) {
                const tab = document.createElement('button');
                tab.className = 'cat-tab'; tab.innerText = category;
                tab.onclick = () => switchTab(category, tab);
                tabsContainer.appendChild(tab);
            }
        }

        function switchTab(category, clickedTab) {
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
            clickedTab.classList.add('active');
            renderChannels(category);
        }

        function renderChannels(category) {
            channelGrid.innerHTML = ''; 
            let channelsToShow = category === 'All' 
                ? Object.values(groupedChannels).flat() 
                : [...(groupedChannels[category] || [])];

            function getPriorityWeight(name) {
                const lower = name.toLowerCase();
                if (lower.includes('toffee')) return 1;
                if (lower.includes('t sports') || lower.includes('tsports')) return 2;
                return 3;
            }

            channelsToShow.sort((a, b) => getPriorityWeight(a.name) - getPriorityWeight(b.name));

            channelsToShow.forEach(ch => {
                const card = document.createElement('div');
                card.className = `channel-card ${ch.url === currentPlayingUrl ? 'active' : ''}`;
                card.innerText = ch.name; card.title = ch.name; 
                card.onclick = () => startOmniEngine(ch.url, ch.name, card);
                channelGrid.appendChild(card);
            });
        }

        // =======================================================
        // OMNI-FALLBACK MULTI-ENGINE SYSTEM
        // =======================================================
        let fallbackSteps = [];
        let currentStepIndex = 0;
        let targetUrl = '';
        let targetName = '';

        function startOmniEngine(url, name, cardElement) {
            currentPlayingUrl = url; targetUrl = url; targetName = name;
            nowPlayingText.innerText = name; liveDot.style.display = 'block';
            
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            if(cardElement) cardElement.classList.add('active');

            if (currentHls) { currentHls.destroy(); currentHls = null; }
            if (currentShaka) { currentShaka.destroy(); currentShaka = null; }
            clearInterval(statTrackerInterval);

            fallbackSteps = [
                { engine: 'hls', proxy: false, label: 'HLS (Direct)' },
                { engine: 'shaka', proxy: false, label: 'Shaka (Direct)' },
                { engine: 'hls', proxy: true, label: 'HLS (Proxy)' },
                { engine: 'shaka', proxy: true, label: 'Shaka (Proxy)' }
            ];
            currentStepIndex = 0;
            executeNextEngine();
        }

        function executeNextEngine() {
            if (currentStepIndex >= fallbackSteps.length) {
                if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    engineStatus.innerText = "Native Player";
                    videoElement.src = targetUrl;
                    videoElement.play().catch(e => setFailedState());
                    startNetworkTracking('native');
                } else {
                    setFailedState();
                }
                return;
            }

            const step = fallbackSteps[currentStepIndex];
            const finalUrl = step.proxy ? 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) : targetUrl;
            engineStatus.innerText = `Trying: ${step.label}`;

            if (step.engine === 'hls' && Hls.isSupported()) {
                currentHls = new Hls({ maxLoadingDelay: 3, manifestLoadingTimeOut: 5000 });
                currentHls.loadSource(finalUrl);
                currentHls.attachMedia(videoElement);
                
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    player.play(); engineStatus.innerText = `Running: ${step.label}`;
                    startNetworkTracking('hls');
                });

                // HLS.js এর ১০০% সঠিক ডেটা ট্র্যাকার
                currentHls.on(Hls.Events.FRAG_LOADED, (event, data) => {
                    let chunkBytes = data.frag.stats.total;
                    totalSessionBytes += chunkBytes;
                    let loadDurationSec = (data.frag.stats.loading.end - data.frag.stats.loading.start) / 1000;
                    
                    let speedMbps = ((chunkBytes * 8 / loadDurationSec) / 1000000).toFixed(1);
                    let totalMb = (totalSessionBytes / 1048576).toFixed(1);
                    
                    updateNetworkUI(speedMbps, totalMb);
                });

                currentHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        currentHls.destroy(); currentHls = null;
                        currentStepIndex++; executeNextEngine();
                    }
                });
            } 
            else if (step.engine === 'shaka' && shaka.Player.isBrowserSupported()) {
                currentShaka = new shaka.Player(videoElement);
                currentShaka.configure({ streaming: { retryParameters: { maxAttempts: 2 } } });
                
                currentShaka.load(finalUrl).then(() => {
                    player.play(); engineStatus.innerText = `Running: ${step.label}`;
                    startNetworkTracking('shaka');
                }).catch(e => {
                    currentShaka.destroy(); currentShaka = null;
                    currentStepIndex++; executeNextEngine();
                });
            } else {
                currentStepIndex++; executeNextEngine();
            }
        }

        function setFailedState() {
            engineStatus.innerText = "Failed";
            nowPlayingText.innerHTML = `<span style="color:var(--accent-red)">⚠️ Error loading stream</span>`;
            liveDot.style.display = 'none';
        }

        window.onload = () => {
            fetchChannels();
            startOmniEngine('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'Demo Stream', null);
        };
    </script>

</body>
</html>
